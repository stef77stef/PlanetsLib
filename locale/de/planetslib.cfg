[mod-setting-description]
PlanetsLib-warn-on-hidden-prerequisites=Warns the player when a game is loaded with hidden prerequisites.
PlanetsLib-update-vanilla-recipe-productivity-techs=Adds all relevant recipes to vanilla recipe productivity technologies if they aren't already added. Should stay enabled during normal use, but may cause compatibility issues with older mods.
PlanetsLib-unlink-hidden-prerequisites=Whenever a technology is a prerequisite, but is also hidden, it is removed as a prerequisite so that the successor is not blocked.
PlanetsLib-enhanced-tooltips=Adds new tooltips to prototypes that expose information to the user previously hidden.
PlanetsLib-enable-entity-replacements=Enables entity replacements not bound to another startup setting. Available to aid in uninstallation as a fallback in case modders fail to bind their entity replacements to a setting.
PlanetsLib-disable-all-entity-replacements=Force disables all entity replacements on all mods. Should not be required unless a mod is severely misconfigured.
PlanetsLib-enable-runtime-rocket-silo-replacements=If planets configure a rocket lift multipler or rocket part multiplier, runtime rocket silo replacements will be applied. Disable this setting to safely disable this behavior and revert replacements made in saves if a mod has used this feature in an unsafe manner.
